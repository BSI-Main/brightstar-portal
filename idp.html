<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>แผนพัฒนารายบุคคล (IDP) 30/60/90 วัน · BrightStar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--berry:#9C7B3F;--gold:#C9A961;--deep:#5C3A22;--ink:#241B12;--paper:#F6F1E6;--cream:#FBF7EE;--grey:#6E6353;--line:#EADFCB;--green:#2E7D32}
*{box-sizing:border-box}body{margin:0;font-family:"Sarabun",sans-serif;color:var(--ink);background:var(--cream);line-height:1.55}
.bar{background:#241B12;color:#FBF7EE;font-size:13px;padding:8px 16px;display:flex;gap:16px;align-items:center;border-bottom:2px solid #C9A961;flex-wrap:wrap}
.bar a{color:#FBF7EE;text-decoration:none;cursor:pointer}.bar a.h{color:#C9A961;font-weight:700}.bar .sp{margin-left:auto}
.hero{background:linear-gradient(160deg,#5C3A22,#9C7B3F 130%);color:#fff;text-align:center;padding:24px 18px 18px;border-bottom:3px solid var(--gold)}
.hero img{width:56px;background:#FFFDF7;border-radius:12px;padding:6px}
.hero .k{letter-spacing:3px;font-size:11px;font-weight:700;color:#ffe9b0;margin-top:5px}
.hero h1{font-family:"Cormorant Garamond",serif;font-size:25px;margin:3px 0 0}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 80px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin:13px 0;box-shadow:0 4px 16px rgba(120,80,20,.07)}
.who{text-align:center}.who .nm{font-size:22px;font-weight:700;color:var(--berry)}.who .meta{color:var(--grey);font-size:13.5px;margin-top:3px}
.sec-h{font-family:"Cormorant Garamond",serif;color:var(--berry);font-size:20px;margin:0 0 8px;border-left:5px solid var(--gold);padding-left:10px}
.dom{margin:8px 0}.dom .top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:3px}.dom .sc{font-weight:700;color:var(--berry)}
.track{height:12px;background:var(--paper);border-radius:9px;overflow:hidden}.fill{height:100%;border-radius:9px;background:linear-gradient(90deg,var(--gold),var(--berry))}
.focus{background:#FBEEE0;border-left:4px solid #E07A2F}
.good{background:var(--paper);border-left:4px solid var(--green)}
.tag{display:inline-block;border-radius:12px;padding:2px 9px;font-size:11.5px;font-weight:700;background:var(--gold);color:#241B12;margin-left:6px}
.phase{border:1px solid var(--line);border-radius:13px;margin:12px 0;overflow:hidden}
.phase .ph{background:var(--deep);color:#FBF7EE;padding:8px 14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.phase .body{padding:12px 14px}
.goal{background:var(--paper);border-radius:8px;padding:8px 12px;font-size:13.5px;margin-bottom:8px}.goal b{color:var(--deep)}
.act{font-size:13.5px;margin:7px 0 7px 0;padding-left:24px;position:relative}.act:before{content:"▶";position:absolute;left:4px;color:var(--gold);font-size:11px;top:3px}
.act .d{font-weight:700;color:var(--berry)}
.chk{width:14px;height:14px;border:1.5px solid var(--grey);border-radius:3px;display:inline-block;margin-right:6px;vertical-align:-2px}
.btn{display:inline-block;background:var(--berry);color:#fff;text-decoration:none;font-weight:700;padding:10px 20px;border-radius:24px;font-size:14px;border:0;cursor:pointer;font-family:inherit}
.btn.ghost{background:transparent;color:var(--berry);border:1.5px solid var(--berry)}.btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.gate{max-width:430px;margin:20px auto;text-align:center}.gate input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin:8px 0;font-family:inherit}
.note{background:var(--paper);border-radius:10px;padding:11px 14px;font-size:12.5px;color:var(--grey);margin-top:10px}
footer{text-align:center;color:var(--grey);font-size:12px;margin-top:24px;border-top:1px solid var(--line);padding-top:14px}
@media print{.bar,.btns{display:none}body{background:#fff}.card{box-shadow:none}}
</style></head><body>
<div class="bar"><a class="h" href="index.html">★ BrightStar Portal</a><a href="parent.html">แดชบอร์ดผู้ปกครอง</a><span class="sp"></span><a onclick="window.print()">🖨 พิมพ์/บันทึก PDF</a></div>
<div class="hero"><img src="logo.png" alt="logo"><div class="k">BRIGHTSTAR ASSESSMENT INSTITUTE</div><h1>แผนพัฒนารายบุคคล (IDP) · 30 / 60 / 90 วัน</h1></div>
<div class="wrap" id="app"></div>
<footer>BrightStar Assessment Institute · แผนพัฒนาเฉพาะบุคคล สร้างอัตโนมัติจากผลประเมิน · กิจกรรมเป็นแนวทาง ปรับตามความพร้อมของเด็กได้</footer>
<script>
var W={th:20,en:20,ma:25,ef:20,mo:15};
var NM={th:['🇹🇭','ภาษาไทย'],en:['🔤','ภาษาอังกฤษ'],ma:['🔢','คณิต-ตรรกะ'],ef:['🧠','EF / เชาวน์'],mo:['✋','กล้ามเนื้อ']};
// คลังกิจกรรมที่บ้าน: [30วัน, 60วัน, 90วัน] ต่อด้าน
var ACT={
 th:[['อ่านนิทานด้วยกันวันละ 10 นาที','ชี้ภาพแล้วชวนลูกเล่าว่าเห็นอะไร'],
     ['ให้ลูกเล่าเรื่องจากภาพ 3-4 ประโยค','เล่นต่อคำ/ต่อประโยคสนุก ๆ'],
     ['หัดเขียนชื่อตัวเอง/คำที่ชอบ','เล่าเรื่องที่ยาวขึ้นและมีลำดับ']],
 en:[['ดูเพลง/การ์ตูนอังกฤษสั้น ๆ วันละ 1 คลิป','ชี้ของรอบตัวแล้วพูดชื่อเป็นภาษาอังกฤษ'],
     ['เล่นจับคู่คำศัพท์หมวด สี/สัตว์/ตัวเลข','ร้องเพลงเด็กภาษาอังกฤษด้วยกัน'],
     ['ฝึกประโยคทักทายง่าย ๆ (Hello/Thank you)','เล่นบทบาทสมมติสั้น ๆ เป็นภาษาอังกฤษ']],
 ma:[['นับสิ่งของจริงในบ้าน (ช้อน ผลไม้)','เปรียบเทียบ มาก-น้อย ใหญ่-เล็ก'],
     ['แยกกลุ่ม/จับคู่ตามสี-รูปทรง','ต่อบล็อก/ตัวต่อตามแบบที่กำหนด'],
     ['บวก-ลบจำนวนน้อย ๆ ด้วยของจริง','เล่นเกมหาแบบรูป (pattern) ที่ซับซ้อนขึ้น']],
 ef:[['เล่นเกมผลัดกัน/รอคอยคิว','เล่นบทบาทสมมติ (พ่อครัว/หมอ)'],
     ['เกมความจำ (จับคู่การ์ด)','ทำตามคำสั่ง 2-3 ขั้นตอนต่อเนื่อง'],
     ['ชวนวางแผนงานเล็ก ๆ (จัดโต๊ะ/เก็บของ)','เกมหยุด-ไป (ฝึกยับยั้งชั่งใจ)']],
 mo:[['วิ่ง กระโดด โยน-รับลูกบอลนุ่ม','เดินทรงตัวบนเส้น/คานเตี้ย'],
     ['ระบายสีในกรอบ ตัดกระดาษตามเส้น','ร้อยลูกปัด/หนีบไม้หนีบผ้า'],
     ['เขียนเส้น-รูปทรงตามแบบ','ปั้นดินน้ำมันเป็นรูปต่าง ๆ']]
};
var GOAL=['เริ่มต้น: สร้างความคุ้นเคยและความสนุก ทำสั้น ๆ สม่ำเสมอทุกวัน',
          'ต่อยอด: เพิ่มความท้าทายทีละน้อย ชวนลูกคิด/ลองเอง',
          'มั่นใจ: ทำได้คล่องขึ้น เชื่อมโยงกับสถานการณ์จริง พร้อมวัดซ้ำ'];
function decode(){try{var m=location.hash.match(/d=([^&]+)/);if(!m)return null;return JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(m[1])))));}catch(e){return null}}
function esc(s){return (''+(s==null?'':s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function render(){
 var app=document.getElementById('app'),d=decode();
 if(!d){app.innerHTML='<div class="card gate"><div style="font-size:36px">🎯</div><h2 style="color:var(--berry);font-family:Cormorant Garamond,serif">ใส่รหัส/ลิงก์ผล</h2><p style="color:var(--grey);font-size:14px">วางลิงก์ผลของบุตรหลานเพื่อสร้างแผนพัฒนาอัตโนมัติ</p><input id="g" placeholder="วางลิงก์ หรือ #d=..." onkeydown="if(event.key===\'Enter\')gg()"><button class="btn" onclick="gg()">สร้างแผน →</button></div>';return;}
 var entries=[];for(var k in W){var v=d.s&&d.s[k];if(v!==''&&v!=null)entries.push([k,Number(v)]);}
 entries.sort(function(a,b){return a[1]-b[1]});
 var focus=entries.filter(function(e){return e[1]<65;}).slice(0,2);
 if(focus.length===0) focus=entries.slice(0,1); // ถ้าเก่งหมด เน้นด้านต่ำสุด 1 ด้านเพื่อต่อยอด
 var strong=entries.length?entries[entries.length-1]:null;
 var bars='';for(var i=0;i<entries.length;i++){var k=entries[i][0],v=entries[i][1];var isF=focus.some(function(f){return f[0]===k;});
   bars+='<div class="dom"><div class="top"><b>'+NM[k][0]+' '+NM[k][1]+(isF?'<span class="tag" style="background:#E07A2F;color:#fff">เน้นพัฒนา</span>':'')+'</b><span class="sc">'+v+'/100</span></div><div class="track"><div class="fill" style="width:'+v+'%"></div></div></div>';}
 // header
 var html='<div class="card who"><div class="nm">'+esc(d.n)+'</div><div class="meta">'+(d.sch?esc(d.sch)+' · ':'')+'ระดับชั้น '+esc(d.c)+(d.dt?' · ประเมิน '+esc(d.dt):'')+'</div>'
  +'<div class="meta">ระดับ '+esc(d.lv&&d.lv.r)+' · '+esc(d.lv&&d.lv.n)+' · คะแนนรวม '+esc(d.w)+'/100</div></div>';
 html+='<div class="card"><div class="sec-h">ภาพรวมคะแนน &amp; ด้านที่เน้นพัฒนา</div>'+bars
  +'<div class="note good">💛 <b>จุดเด่นที่ควรชื่นชมต่อ:</b> '+(strong?NM[strong[0]][1]+' ('+strong[1]+')':'-')+' — ให้กำลังใจและเปิดโอกาสให้ลูกได้ใช้จุดแข็งบ่อย ๆ</div>'
  +'<div class="note focus">🎯 <b>2 ด้านที่แผนนี้จะเน้น:</b> '+focus.map(function(f){return NM[f[0]][1];}).join(' · ')+' — เลือกจากด้านที่คะแนนต่ำสุด เพื่อยกพัฒนาการอย่างตรงจุด</div></div>';
 // phases
 var phases=[['30 วันแรก','0-30',0],['วันที่ 31-60','31-60',1],['วันที่ 61-90','61-90',2]];
 for(var p=0;p<3;p++){
   var ph=phases[p];
   html+='<div class="phase"><div class="ph"><span>📅 '+ph[0]+'</span><span style="font-size:12px;font-weight:400">ช่วงที่ '+(p+1)+'</span></div><div class="body">';
   html+='<div class="goal">🎯 <b>เป้าหมายช่วงนี้:</b> '+GOAL[p]+'</div>';
   focus.forEach(function(f){
     var k=f[0];var acts=ACT[k][p];
     html+='<div class="act"><span class="d">'+NM[k][0]+' '+NM[k][1]+':</span></div>';
     acts.forEach(function(a){html+='<div class="act" style="margin-left:10px"><span class="chk"></span>'+esc(a)+'</div>';});
   });
   html+='</div></div>';
 }
 html+='<div class="card" style="text-align:center"><div class="sec-h" style="text-align:left">ขั้นต่อไป</div>'
  +'<p style="font-size:14px;color:var(--grey)">ทำกิจกรรมสม่ำเสมอ 90 วัน แล้ว <b>วัดซ้ำ</b> เพื่อดูพัฒนาการที่ชัดเจนขึ้น — เด็กส่วนใหญ่ขยับระดับดาวได้เมื่อฝึกตรงจุด</p>'
  +'<div class="btns"><a class="btn" href="https://bsi-main.github.io/brightstar-assessment/BSI_Register.html" target="_blank" rel="noopener">จองรอบวัดซ้ำ</a>'
  +'<a class="btn ghost" href="parent.html'+location.hash+'">← กลับแดชบอร์ด</a>'
  +'<button class="btn ghost" onclick="window.print()">🖨 พิมพ์แผนนี้</button></div></div>';
 app.innerHTML=html;
}
function gg(){var v=document.getElementById('g').value.trim();if(!v)return;var m=v.match(/[#?]d=([^&]+)/);location.hash='d='+(m?m[1]:v);render();}
window.addEventListener('hashchange',render);render();
</script>
</body></html>
