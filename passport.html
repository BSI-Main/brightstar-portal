<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>สมุดพาสปอร์ตพัฒนาการ · BrightStar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--berry:#9C7B3F;--gold:#C9A961;--deep:#5C3A22;--ink:#241B12;--paper:#F6F1E6;--cream:#FBF7EE;--grey:#6E6353;--line:#EADFCB;--green:#2E7D32;--red:#B3261E}
*{box-sizing:border-box}body{margin:0;font-family:"Sarabun",sans-serif;color:var(--ink);background:var(--cream);line-height:1.55}
.bar{background:#241B12;color:#FBF7EE;font-size:13px;padding:8px 16px;display:flex;gap:16px;align-items:center;border-bottom:2px solid #C9A961;flex-wrap:wrap}
.bar a{color:#FBF7EE;text-decoration:none;cursor:pointer}.bar a.h{color:#C9A961;font-weight:700}.bar .sp{margin-left:auto}
.hero{background:linear-gradient(160deg,#5C3A22,#9C7B3F 130%);color:#fff;text-align:center;padding:24px 18px 18px;border-bottom:3px solid var(--gold)}
.hero img{width:56px;background:#FFFDF7;border-radius:12px;padding:6px}
.hero .k{letter-spacing:3px;font-size:11px;font-weight:700;color:#ffe9b0;margin-top:5px}
.hero h1{font-family:"Cormorant Garamond",serif;font-size:25px;margin:3px 0 0}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 80px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin:13px 0;box-shadow:0 4px 16px rgba(120,80,20,.07)}
.who{text-align:center}.who .nm{font-size:22px;font-weight:700;color:var(--berry)}.who .meta{color:var(--grey);font-size:13.5px;margin-top:3px}
.sec-h{font-family:"Cormorant Garamond",serif;color:var(--berry);font-size:20px;margin:0 0 8px;border-left:5px solid var(--gold);padding-left:10px}
.stamp{display:flex;gap:14px;align-items:center;border:1px dashed var(--gold);border-radius:14px;padding:14px;margin:10px 0;background:linear-gradient(135deg,#FFFDF7,#FBF4E4)}
.seal{flex:0 0 70px;height:70px;border-radius:50%;background:radial-gradient(circle,#fff 40%,var(--gold));border:2px solid var(--berry);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--deep);font-weight:700;line-height:1}
.seal .st{font-size:18px;color:var(--gold)}.seal .lv{font-size:15px}
.stamp .info{flex:1}.stamp .rd{font-weight:700;color:var(--deep)}.stamp .dt{font-size:12.5px;color:var(--grey)}
.stamp .w{font-size:22px;font-weight:700;color:var(--berry)}
.chg{font-size:12.5px;font-weight:700}.up{color:var(--green)}.down{color:var(--red)}.same{color:var(--grey)}
.mini{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.mini span{font-size:11px;background:var(--paper);border-radius:8px;padding:1px 7px;color:var(--ink)}
.btn{display:inline-block;background:var(--berry);color:#fff;text-decoration:none;font-weight:700;padding:10px 20px;border-radius:24px;font-size:14px;border:0;cursor:pointer;font-family:inherit}
.btn.gold{background:var(--gold);color:#241B12}.btn.ghost{background:transparent;color:var(--berry);border:1.5px solid var(--berry)}.btn.red{background:transparent;color:var(--red);border:1.5px solid var(--red)}
.btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.gate{max-width:430px;margin:20px auto;text-align:center}.gate input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin:8px 0;font-family:inherit}
.note{background:var(--paper);border-radius:10px;padding:11px 14px;font-size:12.5px;color:var(--grey);margin-top:10px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#241B12;color:#fff;padding:10px 18px;border-radius:24px;font-size:13.5px;opacity:0;transition:.25s;z-index:9999;pointer-events:none}.toast.on{opacity:1}
footer{text-align:center;color:var(--grey);font-size:12px;margin-top:24px;border-top:1px solid var(--line);padding-top:14px}
@media print{.bar,.btns,.toast{display:none}body{background:#fff}}
</style></head><body>
<div class="bar"><a class="h" href="index.html">★ BrightStar Portal</a><a href="parent.html">แดชบอร์ดผู้ปกครอง</a><span class="sp"></span><a onclick="window.print()">🖨 พิมพ์</a></div>
<div class="hero"><img src="logo.png" alt="logo"><div class="k">BRIGHTSTAR ASSESSMENT INSTITUTE</div><h1>สมุดพาสปอร์ตพัฒนาการ</h1></div>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<footer>BrightStar Assessment Institute · สมุดบันทึกพัฒนาการข้ามรอบ · เก็บในเบราว์เซอร์เครื่องนี้ (ส่วนตัว)</footer>
<script>
var W={th:20,en:20,ma:25,ef:20,mo:15};
var NM={th:'ไทย',en:'อังกฤษ',ma:'คณิต',ef:'EF',mo:'กล้ามเนื้อ (MO)'};
var RN={I:1,II:2,III:3,IV:4,V:5,VI:6,VII:7};
function decode(){try{var m=location.hash.match(/d=([^&]+)/);if(!m)return null;return JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(m[1])))));}catch(e){return null}}
function esc(s){return (''+(s==null?'':s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},1800);}
function key(d){return 'bsi_passport_'+(d.id||d.n||'x');}
function load(d){try{return JSON.parse(localStorage.getItem(key(d))||'[]');}catch(e){return[]}}
function save(d,a){try{localStorage.setItem(key(d),JSON.stringify(a));}catch(e){}}
function addRound(){
 var d=decode();if(!d)return;
 var a=load(d);
 var rec={dt:d.dt||new Date().toLocaleDateString('th-TH'),w:d.w,lv:d.lv,s:d.s};
 if(a.some(function(x){return x.dt===rec.dt && x.w===rec.w;})){toast('รอบนี้บันทึกไว้แล้ว');return;}
 a.push(rec);save(d,a);toast('บันทึกผลรอบนี้ลงสมุดแล้ว ✓');render();
}
function delRound(i){var d=decode();if(!d)return;if(!confirm('ลบรอบนี้ออกจากสมุด?'))return;var a=load(d);a.splice(i,1);save(d,a);render();}
function render(){
 var app=document.getElementById('app'),d=decode();
 if(!d){app.innerHTML='<div class="card gate"><div style="font-size:36px">📔</div><h2 style="color:var(--berry);font-family:Cormorant Garamond,serif">เปิดสมุดพาสปอร์ต</h2><p style="color:var(--grey);font-size:14px">วางลิงก์ผลของบุตรหลานเพื่อเปิด/บันทึกสมุดพัฒนาการ</p><input id="g" placeholder="วางลิงก์ หรือ #d=..." onkeydown="if(event.key===\'Enter\')gg()"><button class="btn" onclick="gg()">เปิดสมุด →</button></div>';return;}
 var a=load(d).slice().sort(function(x,y){return (x.w||0)-(y.w||0);}); // not chronological reliably; keep insertion order instead
 a=load(d);
 var html='<div class="card who"><div class="nm">'+esc(d.n)+'</div><div class="meta">'+(d.sch?esc(d.sch)+' · ':'')+'ระดับชั้น '+esc(d.c)+'</div><div class="meta">รหัส '+esc(d.id)+'</div></div>';
 html+='<div class="card"><div class="sec-h">บันทึกผลรอบนี้</div><p style="font-size:13.5px;color:var(--grey);margin:0 0 8px">รอบปัจจุบัน: ประเมิน '+esc(d.dt||'-')+' · คะแนนรวม '+esc(d.w)+' · ระดับ '+esc(d.lv&&d.lv.r)+' '+esc(d.lv&&d.lv.n)+'</p><div class="btns" style="justify-content:flex-start"><button class="btn gold" onclick="addRound()">＋ บันทึกผลรอบนี้ลงสมุด</button></div></div>';
 html+='<div class="card"><div class="sec-h">เส้นทางพัฒนาการ ('+a.length+' รอบ)</div>';
 if(!a.length){html+='<div class="note">ยังไม่มีรอบในสมุด — กด "บันทึกผลรอบนี้" เพื่อเริ่มเก็บ และกลับมาบันทึกอีกในรอบถัดไปเพื่อเห็นพัฒนาการ</div>';}
 else{
  for(var i=0;i<a.length;i++){var r=a[i];var prev=i>0?a[i-1]:null;
   var diff=prev?(r.w-prev.w):null;
   var chg=diff===null?'<span class="chg same">รอบแรก</span>':(diff>0?'<span class="chg up">▲ +'+diff+' คะแนน</span>':(diff<0?'<span class="chg down">▼ '+diff+'</span>':'<span class="chg same">เท่าเดิม</span>'));
   var mini='';for(var k in W){if(r.s&&r.s[k]!=null&&r.s[k]!=='')mini+='<span>'+NM[k]+' '+r.s[k]+'</span>';}
   html+='<div class="stamp"><div class="seal"><div class="st">★</div><div class="lv">'+esc(r.lv&&r.lv.r)+'</div></div>'
    +'<div class="info"><div class="rd">รอบที่ '+(i+1)+' · '+esc(r.lv&&r.lv.n)+'</div><div class="dt">ประเมิน '+esc(r.dt)+'</div><div class="mini">'+mini+'</div></div>'
    +'<div style="text-align:right"><div class="w">'+esc(r.w)+'</div>'+chg+'<br><button class="btn red" style="padding:3px 9px;font-size:11px;margin-top:6px" onclick="delRound('+i+')">ลบ</button></div></div>';
  }
  if(a.length>=2){var first=a[0],last=a[a.length-1];var tot=last.w-first.w;
   html+='<div class="note" style="background:#EAF5EC;border-left:4px solid var(--green)">📈 <b>พัฒนาการรวม:</b> จากรอบแรก '+first.w+' → ล่าสุด '+last.w+' = '+(tot>=0?'+':'')+tot+' คะแนน · ระดับ '+esc(first.lv&&first.lv.r)+' → '+esc(last.lv&&last.lv.r)+'</div>';}
 }
 html+='<div class="btns"><a class="btn ghost" href="parent.html'+location.hash+'">← แดชบอร์ด</a><a class="btn ghost" href="idp.html'+location.hash+'">แผนพัฒนา (IDP)</a><a class="btn" href="https://bsi-main.github.io/brightstar-assessment/BSI_Register.html" target="_blank" rel="noopener">จองรอบถัดไป</a></div></div>';
 app.innerHTML=html;
}
function gg(){var v=document.getElementById('g').value.trim();if(!v)return;var m=v.match(/[#?]d=([^&]+)/);location.hash='d='+(m?m[1]:v);render();}
window.addEventListener('hashchange',render);render();
</script>
</body></html>
